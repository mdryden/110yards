steps:
  - name: "gcr.io/tired-lemur/slackbot"
    args: ["--build", "$BUILD_ID", "--webhook", $_SLACK_WEBHOOK, "--name", "$_BUILD_NAME"]

  - name: "gcr.io/tired-lemur/frontend-devcontainer:latest"
    id: "version"
    entrypoint: /bin/sh
    args:
      - "-c"
      - echo VUE_APP_VERSION=$SHORT_SHA >> file && echo VUE_APP_LAST_UPDATED=$(date --iso-8601=minutes) >> file

  # TODO: run non-UI tests here

  - name: "gcr.io/tired-lemur/frontend-devcontainer:latest"
    id: "deploy"
    entrypoint: /bin/sh
    args:
      - "-c"
      - yarn install && yarn build --mode $_CONFIG && firebase deploy --only hosting --token $_FIREBASE_TOKEN --project $PROJECT_ID

  - name: "gcr.io/tired-lemur/frontend-devcontainer:latest"
    id: "test"
    entrypoint: /bin/sh
    args:
      - "-c"
      - export BASE_URL=$_BASE_URL && yarn test

  # TODO: deploy to live here

  # TODO: re-run UI tests here

substitutions:
  _CONFIG: test
